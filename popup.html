<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Stealth Focus</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            stealth: "#0f172a",   // dark navy
            accent: "#22c55e",    // green
            danger: "#ef4444"
          }
        }
      }
    }
  </script>
</head>

<body class="bg-stealth text-white w-[300px] p-4 font-sans">

  <h1 class="text-lg font-bold mb-3">🕵️ Objective Setup</h1>

  <!-- Objective -->
  <label class="text-xs opacity-80">Objective</label>
  <input
    id="objective"
    class="w-full mt-1 p-2 rounded bg-gray-800 text-white outline-none focus:ring-2 focus:ring-accent"
    placeholder="Study for math exam"
  />

  <!-- Topics -->
  <label class="text-xs opacity-80 mt-3 block">Topics</label>
  <textarea
    id="topics"
    class="w-full mt-1 p-2 rounded bg-gray-800 text-white outline-none focus:ring-2 focus:ring-accent"
    placeholder="calculus, derivatives, limits"
  ></textarea>

  <!-- Time -->
  <label class="text-xs opacity-80 mt-3 block">Focus Time (min)</label>
  <input
    id="minutes"
    type="number"
    class="w-full mt-1 p-2 rounded bg-gray-800 text-white outline-none focus:ring-2 focus:ring-accent"
    placeholder="45"
  />

  <!-- Button -->
  <button
    id="saveBtn"
    class="w-full mt-4 bg-accent text-black font-semibold py-2 rounded hover:opacity-90 transition"
  >
    Start Mission
  </button>

  <!-- Status -->
  <div id="status" class="text-xs mt-2 text-accent"></div>

  <!-- Optional stats -->
  <div class="mt-4 border-t border-gray-700 pt-3 text-xs">
    <div>🧠 Mission Active</div>
    <div>🚫 Distractions Blocked: <span id="blocked">0</span></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
