<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Stealth Focus</title>

  <style>
    body {
      margin: 0;
      padding: 16px;
      width: 320px;
      font-family: "Istok Web", sans-serif;

      /* ✅ Background image */
      background: url("assets/initial_dashboard.png") no-repeat center center;
      background-size: cover;

      color: #cfd8dc;
    }

    h1 {
      font-size: 16px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.15);
      margin: 12px 0;
    }

    .section-title {
      color: #4CAF54;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 10px;
      font-size: 22px ;
    }

    label {
      font-size: 12px;
      margin-top: 10px;
      display: block;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 6px;
      border: none;
      background: #CAD9E7;
      color: #7E8482;
    }

    /* ✅ IMAGE BUTTON STYLING */
    .start-btn {
      width: 100%;
      margin-top: 18px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .start-btn:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }

    .description {
      font-size: 12px;
      line-height: 1.5;
      color: #7E8482;
    }
  </style>
</head>

<body>
  <h1>WELCOME TO STEALTH FOCUS</h1>
  <div class="divider"></div>

  <div class="description">
    Welcome to Stealth Focus, Agent! This is an extension browser that helps you maximize your productivity. Below, fill your objective title then your topics and the time you want to focus for. 
  </div>

  <div class="divider"></div>

  <div class="section-title">MISSION SETUP</div>

  <label>MISSION</label>
  <input id="objective" placeholder="Learn and Practice Derivatives" />

  <label>TOPICS</label>
  <input id="topics" placeholder="Derivatives, Chain Rule..." />

  <label>FOCUS TIME</label>
  <input id="minutes" type="number" placeholder="45" />

  <!-- ✅ IMAGE BUTTON -->
  <img 
    src="assets/button.png" 
    id="startBtn" 
    class="start-btn" 
    alt="Start Mission"
  />

  <script src="popup.js"></script>
</body>
</html>
