<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Stealth Focus</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Istok+Web:wght@400;700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'Intel One Mono';
      src: url('assets/fonts/IntelOneMono-Bold.woff2') format('woff2');
      font-weight: 700;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      padding: 24px;
      font-family: 'Istok Web', sans-serif;
      width: 428px;
      min-height: 660px;
      background: url("assets/initial_dashboard.png") no-repeat center center;
      background-size: cover;
      color: #cfd8dc;
    }

    h1 {
      font-family: 'Intel One Mono', monospace;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 12px;
      color: #ffffff;
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
      margin: 14px 0;
    }

    .description {
      font-family: 'Istok Web', sans-serif;
      font-size: 15px;
      line-height: 1.7;
      color: #cfd8dc;
    }

    .section-title {
      font-family: 'Intel One Mono', monospace;
      color: #4CAF50;
      font-weight: 700;
      letter-spacing: 2px;
      font-size: 22px;
      margin-bottom: 14px;
    }

    label {
      font-family: 'Istok Web', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1.5px;
      margin-top: 16px;
      margin-bottom: 6px;
      display: block;
      color: #cfd8dc;
    }

    input {
      width: 100%;
      padding: 14px 12px;
      border-radius: 6px;
      border: none;
      background: #252C38;
      color: #9298A1;
      font-family: 'Istok Web', sans-serif;
      font-size: 14px;
      outline: none;
      border: 1px solid #20a024;
      transition: all 0.2s ease-in-out;
    }

    input::placeholder {
      color: #B3B9C3;
    }

  .start-btn {
  width: 100%;
  margin-top: 40px;
  padding: 14px 18px;
  background: rgba(20, 35, 40, 0.9);
  border: 1px solid #4CAF50;
  border-radius: 8px;
  color: #e6f9ef;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  box-shadow: 0 0 8px 1px #4CAF50;
  cursor: pointer;
  transition: all 0.2s ease-in-out;
}

.start-btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      box-shadow: none;
    }

    .start-btn:disabled:hover {
      transform: none;
      background: rgba(20, 35, 40, 0.9);
      box-shadow: none;
    }

/* Hover = glow + lift */
.start-btn:hover {
  background: rgba(46, 204, 113, 0.15);
  box-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
  transform: translateY(-1px);
}

/* Click effect */
.start-btn:active {
  transform: translateY(1px);
  box-shadow: 0 0 6px rgba(46, 204, 113, 0.3);
}

/* Arrow animation */
.arrow {
  transition: transform 0.2s ease;
}

.start-btn:hover .arrow {
  transform: translateX(4px);
}

  </style>
</head>

<body>
  <h1>WELCOME TO STEALTH FOCUS</h1>
  <div class="divider"></div>

  <p class="description">
    Welcome to Stealth Focus, Agent! This is an extension browser that helps you maximize
    your productivity. Below, fill your objective title then your topics and the time you
    want to focus for.
  </p>

  <div class="divider"></div>

  <div class="section-title">MISSION SETUP</div>

  <label>MISSION</label>
  <input id="objective" placeholder="Learn and Practice Derivatives" />

  <label>TOPICS</label>
  <input id="topics" placeholder="Derivatives, Chain rules, etc." />

  <label>FOCUS TIME (IN MINUTES)</label>
  <input id="minutes" type="number" placeholder="45" />

  <button id="saveBtn" class="start-btn" disabled>
  START MISSION <span class="arrow">→</span>
  </button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
